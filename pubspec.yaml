name: careerpilot_ai
description: "CareerPilot AI - Your AI Career Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

  # Fonts
  google_fonts: ^8.1.0

  # Onboarding Page Indicator
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.5.5
  lottie: ^3.4.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/